<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter-X | Secure Registry</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --neon: #7ee787;
            --text: #c9d1d9;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Side Navigation */
        nav {
            width: 80px;
            background: var(--card-bg);
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 30px;
        }

        .nav-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            border: 1px solid transparent;
        }

        .nav-icon:hover { background: var(--glass); border-color: var(--accent); }
        .nav-icon.active { background: var(--accent); color: var(--bg); }

        /* Main Content */
        main { flex: 1; padding: 40px; overflow-y: auto; }

        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Creative Cards */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 2rem; color: #fff; margin-top: 0; }
        .accent-text { color: var(--accent); }

        /* Inputs */
        .input-box { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #8b949e; }
        input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1); }

        /* Buttons */
        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { filter: brightness(1.1); transform: scale(1.02); }

        /* Table Design for "Another Webpage" view */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }
        th { background: #1f242c; text-align: left; padding: 15px; color: var(--accent); font-size: 0.9rem; }
        td { padding: 15px; border-bottom: 1px solid #30363d; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid #30363d; }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--neon); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-icon active" onclick="showPage('register', this)">REG</div>
        <div class="nav-icon" onclick="showPage('database', this)">DB</div>
        <div class="nav-icon" onclick="showPage('search', this)">SRCH</div>
    </nav>

    <main>
        <section id="register" class="page active">
            <h1>Voter <span class="accent-text">Registration</span></h1>
            <p>Enter credentials to secure the blockchain registry.</p>
            
            <div class="glass-card">
                <div class="input-box">
                    <label>ACCESS ID</label>
                    <input type="number" id="vId" placeholder="e.g. 5501">
                </div>
                <div class="input-box">
                    <label>CITIZEN NAME</label>
                    <input type="text" id="vName" placeholder="e.g. John Doe">
                </div>
                <button class="btn" onclick="registerVoter()">INITIALIZE REGISTRATION</button>
            </div>
        </section>

        <section id="database" class="page">
            <h1>Citizen <span class="accent-text">Database</span></h1>
            <div class="stats-grid">
                <div class="stat-card">
                    <label>TOTAL ENTRIES</label>
                    <div id="count-val" class="stat-val">0</div>
                </div>
                <div class="stat-card">
                    <label>SYSTEM STATUS</label>
                    <div class="stat-val" style="color: var(--accent)">ENCRYPTED</div>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>NAME</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="voterTableBody">
                    </tbody>
            </table>
        </section>

        <section id="search" class="page">
            <h1>Binary <span class="accent-text">Search</span></h1>
            <p>Locate specific citizen records via ID indexing.</p>
            <div class="glass-card">
                <input type="number" id="searchId" placeholder="Enter ID to Scan...">
                <button class="btn" style="margin-top: 15px; background: var(--neon);" onclick="searchVoter()">EXECUTE SCAN</button>
                <div id="searchResult" style="margin-top: 20px; font-weight: bold;"></div>
            </div>
        </section>
    </main>

<script>
    // Load data
    let voters = JSON.parse(localStorage.getItem('voters')) || [];

    function showPage(pageId, element) {
        // Hide all pages
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        // Show selected
        document.getElementById(pageId).classList.add('active');
        
        // Handle nav styling
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        element.classList.add('active');

        if(pageId === 'database') renderTable();
    }

    function registerVoter() {
        const id = parseInt(document.getElementById('vId').value);
        const name = document.getElementById('vName').value.trim();

        if (!id || !name) return alert("Missing Data Fields");

        if (voters.some(v => v.id === id)) return alert("UID Conflict: ID already exists");

        voters.push({ id, name });
        localStorage.setItem('voters', JSON.stringify(voters));
        
        document.getElementById('vId').value = '';
        document.getElementById('vName').value = '';
        
        alert("Citizen Registered Successfully");
    }

    function renderTable() {
        const tbody = document.getElementById('voterTableBody');
        const countVal = document.getElementById('count-val');
        
        // Sorting automatically (like your C sort function)
        voters.sort((a, b) => a.id - b.id);
        
        tbody.innerHTML = voters.map(v => `
            <tr>
                <td>#${v.id}</td>
                <td style="color: #fff">${v.name}</td>
                <td style="color: var(--neon)">● Verified</td>
            </tr>
        `).join('');

        countVal.innerText = voters.length;
    }

    function searchVoter() {
        const sid = parseInt(document.getElementById('searchId').value);
        const resultDiv = document.getElementById('searchResult');
        
        voters.sort((a, b) => a.id - b.id);
        
        let low = 0, high = voters.length - 1;
        let found = null;

        while (low <= high) {
            let mid = Math.floor((low + high) / 2);
            if (voters[mid].id === sid) {
                found = voters[mid];
                break;
            }
            voters[mid].id < sid ? low = mid + 1 : high = mid - 1;
        }

        if (found) {
            resultDiv.style.color = "var(--neon)";
            resultDiv.innerText = `SCAN COMPLETE: Found ${found.name}`;
        } else {
            resultDiv.style.color = "red";
            resultDiv.innerText = "SCAN FAILED: ID NOT IN DATABASE";
        }
    }
</script>
</body>
</html>
